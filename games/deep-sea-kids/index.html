<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="海底有多深是一个纯前端儿童海洋知识探索游戏。驾驶小潜艇下潜，扫描海洋朋友，了解不同深度的海洋世界。"
    />
    <link rel="canonical" href="https://yapiyapi.fun/games/deep-sea-kids/" />
    <title>海底有多深 - YapiYapi Fun</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app v2-home">
      <section class="v2-topbar" aria-label="探险信息">
        <div class="v2-chip">
          <span>深度</span>
          <strong id="v2DepthValue">0 米</strong>
        </div>
        <div class="v2-goal">
          <span id="v2ChapterLabel">第一关目标</span>
          <strong id="v2GoalName">水母</strong>
          <p id="v2GoalHint">先扫描，找到第一位朋友</p>
        </div>
      </section>

      <section class="energy-card" aria-label="潜艇能量">
        <span>能量</span>
        <meter id="energyMeter" min="0" max="100" value="100"></meter>
        <strong id="energyText">100%</strong>
      </section>

      <section class="v2-actions" aria-label="主要操作">
        <button id="v2ScanButton" type="button">扫描</button>
        <button id="v2DiveButton" type="button">下潜</button>
      </section>

      <section class="hud" aria-label="探险状态">
        <div>
          <span class="label">深度</span>
          <strong id="depthValue">0 米</strong>
        </div>
        <div>
          <span class="label">区域</span>
          <strong id="zoneName">阳光海</strong>
        </div>
      </section>

      <aside class="zone-card" aria-live="polite">
        <span class="zone-kicker">当前海层</span>
        <p id="zoneDescription">这里有很多阳光，海草和珊瑚喜欢这里。</p>
      </aside>

      <aside class="captain-card" aria-live="polite">
        <span class="avatar">潜</span>
        <div>
          <strong>小航海员</strong>
          <p id="captainText">向下滑动，潜艇会带你进入真正的海洋世界。</p>
          <button id="resetGuideButton" type="button">重玩引导</button>
        </div>
      </aside>

      <aside id="guideCard" class="guide-card" aria-live="polite" hidden>
        <span id="guideStep">1/4</span>
        <strong id="guideTitle">先找到第一个朋友</strong>
        <p id="guideText">跟着小航海员，完成一次真正的深海发现。</p>
      </aside>

      <aside class="next-card" aria-live="polite">
        <span id="chapterLabel">下一个发现</span>
        <strong id="nextName">小丑鱼</strong>
        <p id="nextDistance">再下潜 8 米</p>
        <div class="next-actions">
          <button id="scanButton" type="button">扫描</button>
          <button id="nextButton" type="button">前往</button>
        </div>
      </aside>

      <aside class="mini-missions" aria-live="polite">
        <strong id="chapterTitle">探险进度</strong>
        <div id="chapterProgress" class="chapter-progress"></div>
        <div id="miniMissionList"></div>
      </aside>

      <aside class="sticker-shelf" aria-live="polite">
        <strong>贴纸</strong>
        <div id="stickerShelf"></div>
      </aside>

      <div class="dive-pad" aria-label="下潜控制">
        <button id="riseButton" type="button">上浮</button>
        <button id="diveButton" type="button">下潜</button>
      </div>

      <aside class="journey-rail" aria-label="深度旅程">
        <span style="--mark:0%">0m</span>
        <span style="--mark:20%">1000m</span>
        <span style="--mark:60%">3000m</span>
        <span style="--mark:100%">5000m</span>
        <div id="journeyProgress" class="journey-progress"></div>
      </aside>

      <section id="ocean" class="ocean" aria-label="深海探索场景">
        <div class="v2-depth-bg shallow"></div>
        <div class="v2-depth-bg blue"></div>
        <div class="v2-depth-bg twilight"></div>
        <div class="v2-depth-bg abyssal"></div>
        <div class="sunbeams"></div>
        <div class="stars" aria-hidden="true"></div>
        <div class="reef reef-left" aria-hidden="true">
          <span class="coral branch"></span>
          <span class="coral fan"></span>
          <span class="seaweed w1"></span>
          <span class="seaweed w2"></span>
          <span class="seaweed w3"></span>
        </div>
        <div class="reef reef-right" aria-hidden="true">
          <span class="coral fan"></span>
          <span class="coral branch"></span>
          <span class="seaweed w1"></span>
          <span class="seaweed w2"></span>
        </div>
        <div class="fish-school" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="distant-life" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div id="sonarRing" class="sonar-ring" aria-hidden="true"></div>
        <div class="bubbles" aria-hidden="true"></div>
        <div id="creatureLayer" class="creature-layer"></div>
        <div id="submarine" class="submarine" aria-label="小潜艇">
          <div id="targetArrow" class="target-arrow" aria-hidden="true"></div>
          <div id="pilotPrompt" class="pilot-prompt" hidden>
            <span id="pilotPromptText">靠近目标</span>
            <button id="pilotActionButton" type="button">扫描</button>
          </div>
          <div class="sub-light"></div>
          <div class="sub-bubble-trail"><span></span><span></span><span></span></div>
          <img class="sub-sprite" src="./assets/sprites/final/submarine.png" alt="" />
          <div class="sub-body">
            <div class="window"></div>
            <div class="sub-face"></div>
            <div class="tail"></div>
            <div class="fin top"></div>
            <div class="fin bottom"></div>
          </div>
        </div>
        <div class="seafloor">
          <div class="vent"></div>
          <div class="vent small"></div>
          <div class="rock"></div>
        </div>
      </section>

      <nav class="toolbar" aria-label="工具栏">
        <button id="collectionButton" type="button"><i>册</i><span>图鉴</span><strong id="bookCount">0/16</strong></button>
        <button id="missionButton" type="button"><i>星</i><span>任务</span><strong id="missionCount">0/3</strong></button>
        <button id="labButton" type="button"><i>光</i><span>实验室</span><strong>光线</strong></button>
        <button id="paintButton" type="button"><i>漆</i><span>涂装</span><strong id="paintName">阳光黄</strong></button>
        <button id="lightButton" type="button"><i>灯</i><span>探照灯</span><strong>开灯</strong></button>
      </nav>

      <div class="scroll-space" aria-hidden="true"></div>
    </main>

    <section id="factPanel" class="panel fact-panel" aria-live="polite" hidden></section>
    <section id="encounterPanel" class="panel encounter-panel" aria-live="polite" hidden></section>
    <section id="collectionPanel" class="panel side-panel" hidden></section>
    <section id="missionPanel" class="panel side-panel" hidden></section>
    <section id="paintPanel" class="panel side-panel" hidden></section>
    <section id="labPanel" class="panel side-panel lab-panel" hidden></section>
    <section id="rewardPanel" class="panel reward-panel" aria-live="polite" hidden></section>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
